name: Frontend Quality Checks

on:
  push:
    branches: [main, develop]
    paths:
      - "website/**"
      - "web-app/**"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "website/**"
      - "web-app/**"
      - ".github/workflows/lint.yml"

jobs:
  web-app:
    name: Web App Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          cd web-app
          pnpm install

      - name: Check for .env file
        run: |
          cd web-app
          if [ ! -f .env ]; then
            echo "❌ .env file not found in web-app directory"
            echo "Creating .env from .env.example if it exists..."
            if [ -f .env.example ]; then
              cp .env.example .env
              echo "✅ Created .env from .env.example"
            else
              echo "❌ No .env.example file found either"
              echo "Please ensure environment variables are properly configured"
              exit 1
            fi
          else
            echo "✅ .env file found"
          fi

      - name: Validate environment variables
        run: |
          cd web-app
          # Check if .env file has content
          if [ -f .env ] && [ -s .env ]; then
            echo "✅ .env file exists and has content"
            echo "Environment variables found:"
            # Show variable names only (not values for security)
            grep -E '^[A-Z_]+=' .env | cut -d'=' -f1 | sort || echo "No environment variables found in .env"
          else
            echo "⚠️  .env file is empty or missing"
          fi

      - name: Run TypeScript check
        run: |
          cd web-app
          pnpm type-check

      - name: Run ESLint
        run: |
          cd web-app
          pnpm lint

      - name: Run Prettier check
        run: |
          cd web-app
          pnpm prettier:check

      - name: Build platform frontend
        run: |
          cd web-app
          pnpm build

  frontend:
    name: Main Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          cd website
          pnpm install

      - name: Check for .env file
        run: |
          cd website
          if [ ! -f .env ]; then
            echo "❌ .env file not found in website directory"
            echo "Creating .env from .env.example if it exists..."
            if [ -f .env.example ]; then
              cp .env.example .env
              echo "✅ Created .env from .env.example"
            else
              echo "❌ No .env.example file found either"
              echo "Please ensure environment variables are properly configured"
              exit 1
            fi
          else
            echo "✅ .env file found"
          fi

      - name: Validate environment variables
        run: |
          cd website
          # Check if .env file has content
          if [ -f .env ] && [ -s .env ]; then
            echo "✅ .env file exists and has content"
            echo "Environment variables found:"
            # Show variable names only (not values for security)
            grep -E '^[A-Z_]+=' .env | cut -d'=' -f1 | sort || echo "No environment variables found in .env"
          else
            echo "⚠️  .env file is empty or missing"
          fi

      - name: Run TypeScript check
        run: |
          cd website
          pnpm type-check

      - name: Run ESLint
        run: |
          cd website
          pnpm lint

      - name: Run Prettier check
        run: |
          cd website
          pnpm prettier:check

      - name: Build main frontend
        run: |
          cd website
          pnpm build
