name: Frontend Quality Checks

on:
  push:
    branches: [main, develop]
    paths:
      - "website/**"
      - "web-app/**"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "website/**"
      - "web-app/**"
      - ".github/workflows/lint.yml"

jobs:
  web-app:
    name: Web App Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          cd web-app
          pnpm install

      - name: Run TypeScript check
        run: |
          cd web-app
          pnpm type-check

      - name: Run ESLint
        run: |
          cd web-app
          pnpm lint

      - name: Run Prettier check
        run: |
          cd web-app
          pnpm prettier:check

      - name: Build platform frontend
        run: |
          cd web-app
          pnpm build

  frontend:
    name: Main Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.0

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: |
          cd website
          pnpm install

      - name: Run TypeScript check
        run: |
          cd website
          pnpm type-check

      - name: Run ESLint
        run: |
          cd website
          pnpm lint

      - name: Run Prettier check
        run: |
          cd website
          pnpm prettier:check

      - name: Build main frontend
        run: |
          cd website
          pnpm build
