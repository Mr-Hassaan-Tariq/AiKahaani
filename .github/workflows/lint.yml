name: Frontend Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Run ESLint
        run: |
          cd frontend
          pnpm lint

      - name: Run Prettier check
        run: |
          cd frontend
          pnpm prettier:check

      - name: Build frontend
        run: |
          cd frontend
          pnpm build
