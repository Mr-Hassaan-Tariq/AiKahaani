openapi: 3.0.3
info:
  title: TubeGenius API
  version: 1.0.0
  x-logo:
    url: https://tubegenius.vercel.app/logo.png
  description: API for TubeGenius YouTube script generation platform
paths:
  /api/auth/admin/login/:
    post:
      operationId: admin_login
      description:
        Login for admin users using email and password. Only users with
        admin role can access.
      summary: Admin Login
      tags:
        - Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
          description: Login successful
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Invalid credentials or not admin user
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Too many requests
  /api/auth/google/:
    post:
      operationId: api_auth_google_create
      description:
        Authenticates the user using a Google ID token or authorization
        code.
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthInputRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/GoogleAuthInputRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/GoogleAuthInputRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleAuthInput"
          description: ""
  /api/auth/logout/:
    post:
      operationId: logout
      description:
        Logs out the current user by blacklisting both refresh and access
        tokens. Requires a valid refresh token in the request body.
      summary: Logout user
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                LogoutSuccess:
                  value:
                    message: Logged out successfully
                  summary: Logout Success
          description: Logout successful
        "400":
          description: Invalid refresh token
  /api/auth/magic-link/:
    post:
      operationId: magic_link_login
      description:
        Sends a magic link to the provided email address for passwordless
        authentication. If the user doesn't exist, a new user account will be created
        automatically. The username is extracted from the email address (part before
        '@'). The magic link expires in 15 minutes.
      summary: Send Magic Link for Authentication
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkLoginRequest"
            examples:
              MagicLinkRequest:
                value:
                  email: john.doe@example.com
                summary: Request magic link for existing or new user
                description: Send magic link to user's email
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MagicLinkLoginRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MagicLinkLoginRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkLoginSuccessResponse"
              examples:
                MagicLinkSent:
                  value:
                    message: Magic link sent to your email
                  summary: Magic Link Sent
          description: Magic link sent successfully
        "400":
          description: Invalid email format or missing email
        "500":
          description: Email service is temporarily unavailable
  /api/auth/magic-link/verify/:
    post:
      operationId: magic_link_verify
      description:
        Verifies the magic link token received via email and returns JWT
        authentication tokens. The token is validated for existence and expiration.
        Upon successful verification, the token is immediately invalidated (single-use)
        and JWT tokens are generated for the user.
      summary: Verify Magic Link Token
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkVerifyRequest"
            examples:
              MagicLinkVerificationRequest:
                value:
                  token: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                summary: Verify magic link token
                description: Submit the token received via magic link email
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MagicLinkVerifyRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MagicLinkVerifyRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkVerifySuccessResponse"
              examples:
                AuthenticationSuccess:
                  value:
                    refresh: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ0b2tlbl90eXBlIjoicmVmcmVzaCIsImV4cCI6MTcwNjg5ODA2MSwidXNlcl9pZCI6MX0.abc123def456
                    access: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzA2ODExNjYxLCJ1c2VyX2lkIjoxfQ.xyz789uvw456
                    user:
                      id: "1"
                      email: john.doe@example.com
                      username: john.doe
                      fullname: John Doe
                  summary: Authentication Success
          description: Token verified and JWT tokens generated
        "400":
          description: Invalid, expired or malformed token
  /api/auth/refresh/:
    post:
      operationId: refresh_token
      description: Get new access token using refresh token. Available for all users.
      summary: Refresh Token
      tags:
        - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
          description: Token refreshed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Invalid refresh token
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Too many requests
  /api/auth/signup/:
    post:
      operationId: api_auth_signup_create
      description: |-
        Mixin that applies method-specific throttling to views.

        This mixin automatically adds throttle classes for all HTTP methods
        (GET, POST, PUT, DELETE) with different rate limits for authenticated
        and anonymous users based on the settings.py configuration:

        - GET: 3/minute
        - POST: 20/minute
        - PUT: 20/minute
        - DELETE: 10/minute

        Usage:
            class MyView(MethodSpecificThrottleMixin, generics.ListAPIView):
                # Your view implementation
                pass
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSignupRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/UserSignupRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserSignupRequest"
        required: true
      security:
        - {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSignup"
          description: ""
  /api/file/{uuid}/export/:
    post:
      operationId: api_file_export_create
      description:
        Export a full script to various file formats (.txt, .pdf, .docx).
        The file will be downloaded with appropriate headers.
      summary: Export script to file
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum:
              - docx
              - pdf
              - txt
          description: "Export format: txt, pdf, or docx"
          required: true
        - in: path
          name: uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportScriptResponseRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ExportScriptResponseRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ExportScriptResponseRequest"
        required: true
      responses:
        "200":
          description: File exported successfully
        "400":
          description: Invalid format specified
        "404":
          description: Script not found or access denied
        "403":
          description: Active subscription required
  /api/v1/admin/niche-pacings/:
    get:
      operationId: api_v1_admin_niche_pacings_list
      description: Retrieve a list of all niche pacings.
      summary: List Niche Pacings
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          required: false
          in: query
          description: The initial index from which to return the results.
          schema:
            type: integer
        - name: ordering
          required: false
          in: query
          description: Which field to use when ordering the results.
          schema:
            type: string
        - name: search
          required: false
          in: query
          description: A search term.
          schema:
            type: string
      tags:
        - Admin Niches
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNichePacingList"
          description: ""
    post:
      operationId: api_v1_admin_niche_pacings_create
      description: Create a new niche pacing.
      summary: Create Niche Pacing
      tags:
        - Admin Niches
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
        required: true
      responses:
