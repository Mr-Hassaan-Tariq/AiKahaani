  /api/v1/admin/niches/:
    get:
      operationId: api_v1_admin_niches_list
      description: |-
        Retrieve a paginated list of niches with filtering and search capabilities.

        **Query Parameters:**
        - `limit`: Number of items to return (default: 20, max: 100)
        - `offset`: Number of items to skip (default: 0)
        - `search`: Search by title or tagline (custom search filter)
        - `status`: Filter by status (active/inactive)
        - `ordering`: Order by field (e.g., 'created', '-created', 'title', '-title')

        **Note:** The `search` parameter uses a custom filter that searches in both title and tagline fields.
      summary: List Niches
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          description: "Number of items to return (default: 20, max: 100)"
        - in: query
          name: offset
          schema:
            type: integer
          description: "Number of items to skip (default: 0)"
        - in: query
          name: ordering
          schema:
            type: string
          description: Ordering field (e.g., 'created', '-created', 'title')
        - in: query
          name: search
          schema:
            type: string
          description: Search by title or tagline
        - in: query
          name: status
          schema:
            type: string
          description: Filter by status (active/inactive)
      tags:
        - Admin Niches
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNicheList"
              examples:
                ListNichesResponse:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?offset=400&limit=100
                    previous: http://api.example.org/accounts/?offset=200&limit=100
                    results:
                      - count: 25
                        next: http://api.example.com/api/niches/?limit=20&offset=20
                        previous: null
                        results:
                          - id: 1
                            admin: 1
                            title: Tech Reviews
                            tagline: Latest tech product reviews
                            thumbnail: null
                            script_structure:
                              intro: Hook
                              body: Review
                            tone:
                              - Educational
                              - Professional
                            pacing:
                              - Fast
                              - Dynamic
                            top_channels:
                              - name: MKBHD
                                link: https://youtube.com/@mkbhd
                            best_for:
                              - Technology
                            status: active
                            created: "2025-01-15T10:30:00Z"
                            modified: "2025-01-15T10:30:00Z"
                          - id: 2
                            admin: 1
                            title: Gaming News
                            tagline: Latest gaming updates
                            thumbnail: null
                            script_structure: null
                            tone:
                              - Casual
                              - Exciting
                            pacing:
                              - Medium
                            top_channels: []
                            best_for:
                              - Gaming
                              - Entertainment
                            status: active
                            created: "2025-01-14T09:20:00Z"
                            modified: "2025-01-14T09:20:00Z"
                  summary: List Niches Response
                  description: Example response showing paginated niches list
          description: ""
    post:
      operationId: api_v1_admin_niches_create
      description: |-
        Create a new niche with detailed content structure.

        **Required Fields:**
        - `title` (string): The title of the niche
        - `tagline` (string): A brief tagline for the niche

        **Optional Fields:**
        - `thumbnail` (file): Image file for the niche thumbnail
        - `script_structure` (JSON object): Custom script structure configuration
        - `tone` (list of strings): List of tone names. Non-existent tones will be created automatically
        - `pacing` (list of strings): List of pacing names. Non-existent pacings will be created automatically
        - `top_channels` (list of objects): YouTube channels with name and link
          - Each object must have: `name` (string) and `link` (string)
        - `best_for` (list of strings): Categories this niche is best suited for
        - `status` (string): Either 'active' or 'inactive' (default: 'active')

        **Note:** The `admin` field is automatically set to the authenticated user.
      summary: Create Niche
      tags:
        - Admin Niches
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NicheRequest"
            examples:
              CreateNicheExample:
                value:
                  title: Tech Reviews
                  tagline: Latest tech product reviews and analysis
                  tone:
                    - Educational
                    - Professional
                    - Engaging
                  pacing:
                    - Fast
                    - Dynamic
                  top_channels:
                    - name: MKBHD
                      link: https://youtube.com/@mkbhd
                    - name: Linus Tech Tips
                      link: https://youtube.com/@LinusTechTips
                  best_for:
                    - Technology
                    - Product Reviews
                    - Gadgets
                  script_structure:
                    intro: Hook with latest tech trend
                    body: Detailed review
                    conclusion: Recommendation
                  status: active
                summary: Create Niche Example
                description: Example of creating a tech review niche with all fields
              MinimalCreateExample:
                value:
                  title: Gaming News
                  tagline: Latest gaming industry news and updates
                summary: Minimal Create Example
                description: Minimal example with only required fields
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/NicheRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NicheRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Niche"
          description: ""
  /api/v1/admin/niches/{id}/:
    get:
      operationId: api_v1_admin_niches_retrieve
      description: Retrieve detailed information about a specific niche by ID.
      summary: Get Niche Details
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this niche.
          required: true
      tags:
        - Admin Niches
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Niche"
              examples:
                NicheResponseExample:
                  value:
                    data:
                      id: 1
                      admin: 1
                      title: Tech Reviews
                      tagline: Latest tech product reviews and analysis
                      thumbnail: null
                      script_structure:
                        intro: Hook with latest tech trend
                        body: Detailed review
                        conclusion: Recommendation
                      tone:
                        - Educational
                        - Professional
                        - Engaging
                      pacing:
                        - Fast
                        - Dynamic
                      top_channels:
                        - name: MKBHD
                          link: https://youtube.com/@mkbhd
                      best_for:
                        - Technology
                        - Product Reviews
                      status: active
                      created: "2025-01-15T10:30:00Z"
                      modified: "2025-01-15T10:30:00Z"
                    message: Niche details retrieved successfully
                  summary: Niche Response Example
                  description: Example response showing niche details
          description: ""
    put:
      operationId: api_v1_admin_niches_update
      description: |-
        Update niche information. All fields from the create endpoint apply.

        **Important:**
        - Tones/pacings that don't exist will be created automatically
        - `top_channels` must follow the format: `[{"name": "...", "link": "..."}]`
        - All validations from the create endpoint apply
      summary: Update Niche
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this niche.
          required: true
      tags:
        - Admin Niches
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NicheRequest"
            examples:
