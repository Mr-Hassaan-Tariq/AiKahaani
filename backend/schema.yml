      description:
        "\n            Retrieve paginated notifications for the authenticated\
        \ user.\n\n            - Requires authentication.\n            - Returns notifications\
        \ ordered by creation date (newest first).\n            - Optional query parameter\
        \ 'read' to filter by read/unread status.\n            - Optional query parameter\
        \ 'type' to filter by notification type.\n            - Supports pagination\
        \ with 'limit' and 'offset' parameters.\n            "
      summary: List user notifications
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          description:
            "Number of notifications to return per page (default: 20, max:
            100)"
        - in: query
          name: offset
          schema:
            type: integer
          description:
            "Number of notifications to skip from the beginning (default:
            0)"
        - in: query
          name: read
          schema:
            type: boolean
          description: Filter notifications by read status (true/false)
        - in: query
          name: type
          schema:
            type: string
            enum:
              - account
              - community
              - drafts
              - feature
              - script
              - subscription
              - tips
              - title
          description:
            "Filter notifications by type. Available types: script, account,
            feature, tips, community, subscription, drafts, title"
      tags:
        - Notifications
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUserNotificationList"
          description: ""
