          maxLength: 5000
        type:
          allOf:
            - $ref: "#/components/schemas/TypeEnum"
          description: |-
            The type of the product. The product is either of type `good`, which is eligible for use with Orders and SKUs, or `service`, which is eligible for use with Subscriptions and Plans.

            * `good` - Good
            * `service` - Service
        active:
          type: boolean
          nullable: true
          description:
            Whether the product is currently available for purchase. Only
            applicable to products of `type=good`.
        attributes:
          nullable: true
          description:
            A list of up to 5 attributes that each SKU can provide values
