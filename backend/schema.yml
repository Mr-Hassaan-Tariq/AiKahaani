  /api/v1/scripts/generations/:
    get:
      operationId: api_v1_scripts_generations_list
      description:
        "\n    Retrieve a unified list of both script outlines and full\
        \ scripts with comprehensive filtering and sorting options.\n\n    **Filter\
        \ Combinations:**\n    - Use `type=script` to apply word_count and duration\
        \ filters only to scripts\n    - Use `type=outline` to get only outlines (word_count/duration\
        \ filters ignored)\n    - Combine multiple filters for precise results\n\n\
        \    **Pagination:**\n    - Use `limit` parameter to specify number of items\
        \ per page (default: 20, max: 100)\n    - Use `offset` parameter to specify\
        \ starting position (default: 0)\n    - Example: `?limit=10&offset=20` returns\
        \ items 21-30\n\n    **Examples:**\n    - `?type=script&word_count_min=500&duration_max=10&limit=15`\
        \ - Scripts with 500+ words, max 10 min, 15 per page\n    - `?filter_type=saved&search=tutorial&limit=5`\
        \ - Saved items containing 'tutorial', 5 per page\n    - `?status=generated&ordering=-modified&limit=25&offset=50`\
        \ - Generated items, newest first, page 3 (items 51-75)\n    "
      summary: List all generations (unified)
      parameters:
        - in: query
          name: duration_max
          schema:
            type: number
            format: float
          description:
            "Maximum estimated video duration in minutes (only applies to
            scripts, outlines are unaffected). Example: 15.0"
        - in: query
          name: duration_min
          schema:
            type: number
            format: float
          description:
            "Minimum estimated video duration in minutes (only applies to
            scripts, outlines are unaffected). Example: 3.5"
        - in: query
          name: filter_type
          schema:
            type: string
          description: "Filter by type: all, outline_drafts, script_drafts, saved"
        - in: query
          name: limit
          schema:
            type: integer
          description: "Number of items to return per page (default: 20, max: 100)"
        - in: query
          name: offset
          schema:
            type: integer
          description: "Number of items to skip from the beginning (default: 0)"
        - in: query
          name: ordering
          schema:
            type: string
          description:
            "Order by field: created, modified, title, word_count, estimated_duration.
            Use - for descending (e.g., -created)"
        - in: query
          name: search
          schema:
            type: string
          description: Search by title or content across both outlines and scripts
        - in: query
          name: status
          schema:
            type: string
          description: "Filter by status: draft, generated, saved"
        - in: query
          name: type
          schema:
            type: string
          description: "Filter by generation type: outline, script"
        - in: query
          name: word_count_max
          schema:
            type: integer
          description:
            "Maximum word count for scripts (only applies to scripts, outlines
            are unaffected). Example: 2000"
        - in: query
          name: word_count_min
          schema:
            type: integer
          description:
            "Minimum word count for scripts (only applies to scripts, outlines
            are unaffected). Example: 500"
      tags:
        - api
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUnifiedGenerationList"
          description: Generations retrieved successfully with pagination metadata
        "404":
          description: No generations found for the given filters
        "400":
          description: Invalid filter parameters
  /api/v1/scripts/outline/:
    post:
      operationId: api_v1_scripts_outline_create
      description: |-
        Generate a detailed script outline using multiple tones.

        **Three input methods supported:**
        1. **Text Description (JSON)**: Provide a text description in JSON format
        2. **Image Upload (Form Data)**: Upload an image file using multipart/form-data
        3. **Image URL**: Provide an image URL that will be analyzed

        **Usage:**
        - For text input: Use `Content-Type: application/json` with `description` field
        - For image file: Use `Content-Type: multipart/form-data` with `image` file
        - For image URL: Use either JSON or form data with `image_url` field
        - Either `description`, `image` file, or `image_url` must be provided (only one)
        - **When providing an image**: No need to provide title or description - they will be automatically generated from the image content using OpenAI Vision
      summary: Generate script outline
      tags:
        - api
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/GenerateOutlineRequestRequest"
            examples:
              ImageUpload(FormData):
                value:
                  tones:
                    - 1
                    - 3
                  template_style: 1
                  min_length: 300
                  max_length: 1000
                  image: "[Upload image file here]"
                summary: Image Upload (Form Data)
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOutlineRequestRequest"
            examples:
              TextDescription(JSON):
                value:
                  description: How to learn Python programming from scratch
                  tones:
                    - 1
                  template_style: 2
                  min_length: 200
                  max_length: 800
                  title: Python Learning Guide
                summary: Text Description (JSON)
              ImageURL(JSON):
                value:
                  tones:
                    - 1
                    - 2
                  template_style: 2
                  min_length: 200
                  max_length: 800
                  image_url: https://example.com/path/to/image.jpg
                summary: Image URL (JSON)
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOutlineResponse"
              examples:
                TextDescription(JSON):
                  value:
                    description: How to learn Python programming from scratch
                    tones:
                      - 1
                    template_style: 2
                    min_length: 200
                    max_length: 800
                    title: Python Learning Guide
                  summary: Text Description (JSON)
                ImageURL(JSON):
                  value:
                    tones:
                      - 1
                      - 2
                    template_style: 2
                    min_length: 200
                    max_length: 800
                    image_url: https://example.com/path/to/image.jpg
                  summary: Image URL (JSON)
          description: Script outline generated successfully
        "400":
          description: Invalid input data - either description or image must be provided
        "403":
          description: Active subscription required
        "500":
          description: Outline generation or image analysis failed
