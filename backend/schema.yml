    Subscription:
      type: object
      properties:
        djstripe_id:
          type: integer
          readOnly: true
          title: ID
        plan:
          $ref: "#/components/schemas/Plan"
        djstripe_created:
          type: string
          format: date-time
          readOnly: true
        djstripe_updated:
          type: string
          format: date-time
          readOnly: true
        id:
          type: string
          maxLength: 255
        livemode:
          type: boolean
          nullable: true
          description:
            Null here indicates that the livemode status is unknown or
            was previously unrecorded. Otherwise, this field indicates whether this
            record comes from Stripe test mode or live mode operation.
        created:
          type: string
          format: date-time
          nullable: true
          description: The datetime this object was created in stripe.
        metadata:
          nullable: true
          description:
            A set of key/value pairs that you can attach to an object.
            It can be useful for storing additional information about an object in
            a structured format.
        description:
          type: string
          nullable: true
          description: A description of this object.
        application_fee_percent:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
          description:
            A positive decimal that represents the fee percentage of the
            subscription invoice amount that will be transferred to the application
            owner's Stripe account each billing period.
        billing_cycle_anchor:
          type: string
          format: date-time
          nullable: true
          description:
            Determines the date of the first full invoice, and, for plans
            with `month` or `year` intervals, the day of the month for subsequent
            invoices.
        billing_thresholds:
          nullable: true
          description:
            Define thresholds at which an invoice will be sent, and the
            subscription advanced to a new billing period.
        cancel_at:
          type: string
          format: date-time
          nullable: true
          description:
            A date in the future at which the subscription will automatically
            get canceled.
        cancel_at_period_end:
          type: boolean
          description:
            If the subscription has been canceled with the ``at_period_end``
            flag set to true, ``cancel_at_period_end`` on the subscription will be
            true. You can use this attribute to determine whether a subscription that
            has a status of active is scheduled to be canceled at the end of the current
            period.
        canceled_at:
          type: string
          format: date-time
          nullable: true
          description:
            If the subscription has been canceled, the date of that cancellation.
            If the subscription was canceled with ``cancel_at_period_end``, canceled_at
            will still reflect the date of the initial cancellation request, not the
            end of the subscription period when the subscription is automatically
            moved to a canceled state.
        collection_method:
          allOf:
            - $ref: "#/components/schemas/CollectionMethodEnum"
          description: |-
            Either `charge_automatically`, or `send_invoice`. When charging automatically, Stripe will attempt to pay this subscription at the end of the cycle using the default source attached to the customer. When sending an invoice, Stripe will email your customer an invoice with payment instructions.

            * `charge_automatically` - Charge automatically
            * `send_invoice` - Send invoice
        current_period_end:
          type: string
          format: date-time
          description:
            End of the current period for which the subscription has been
            invoiced. At the end of this period, a new invoice will be created.
        current_period_start:
          type: string
          format: date-time
          description:
            Start of the current period for which the subscription has
            been invoiced.
        days_until_due:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description:
            Number of days a customer has to pay invoices generated by
            this subscription. This value will be `null` for subscriptions where `billing=charge_automatically`.
        discount:
          nullable: true
          description:
            Describes the current discount applied to this subscription,
            if there is one. When billing, a discount applied to a subscription overrides
            a discount applied on a customer-wide basis.
        ended_at:
          type: string
          format: date-time
          nullable: true
          description:
            If the subscription has ended (either because it was canceled
            or because the customer was switched to a subscription to a new plan),
            the date the subscription ended.
        next_pending_invoice_item_invoice:
          type: string
          format: date-time
          nullable: true
          description:
            Specifies the approximate timestamp on which any pending invoice
            items will be billed according to the schedule provided at pending_invoice_item_interval.
        pause_collection:
          nullable: true
          description:
            If specified, payment collection for this subscription will
            be paused.
        pending_invoice_item_interval:
          nullable: true
          description:
            Specifies an interval for how often to bill for any pending
            invoice items. It is analogous to calling Create an invoice for the given
            subscription at the specified interval.
        pending_update:
          nullable: true
          description:
            If specified, pending updates that will be applied to the subscription
            once the latest_invoice has been paid.
        proration_behavior:
          description: |-
            Determines how to handle prorations when the billing cycle changes (e.g., when switching plans, resetting billing_cycle_anchor=now, or starting a trial), or if an item’s quantity changes

            * `always_invoice` - Always invoice
            * `create_prorations` - Create prorations
            * `none` - None
          oneOf:
            - $ref: "#/components/schemas/ProrationBehaviorEnum"
            - $ref: "#/components/schemas/BlankEnum"
        proration_date:
          type: string
          format: date-time
          nullable: true
          description:
            If set, the proration will be calculated as though the subscription
            was updated at the given time. This can be used to apply exactly the same
            proration that was previewed with upcoming invoice endpoint. It can also
            be used to implement custom proration logic, such as prorating by day
            instead of by second, by providing the time that you wish to use for proration
            calculations
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description:
            The quantity applied to this subscription. This value will
            be `null` for multi-plan subscriptions
        start_date:
          type: string
          format: date-time
          nullable: true
          description:
            Date when the subscription was first created. The date might
            differ from the created date due to backdating.
        status:
          allOf:
            - $ref: "#/components/schemas/SubscriptionStatusEnum"
          description: |-
            The status of this subscription.

            * `active` - Active
            * `canceled` - Canceled
            * `incomplete` - Incomplete
            * `incomplete_expired` - Incomplete Expired
            * `past_due` - Past due
            * `trialing` - Trialing
            * `unpaid` - Unpaid
        trial_end:
          type: string
          format: date-time
          nullable: true
          description: If the subscription has a trial, the end of that trial.
        trial_start:
          type: string
          format: date-time
          nullable: true
          description: If the subscription has a trial, the beginning of that trial.
        djstripe_owner_account:
          type: string
          nullable: true
          description: The Stripe Account this object belongs to.
        customer:
          type: string
          description: The customer associated with this subscription.
        default_payment_method:
          type: string
          nullable: true
          description:
            The default payment method for the subscription. It must belong
            to the customer associated with the subscription. If not set, invoices
            will use the default payment method in the customer's invoice settings.
        default_source:
          type: string
          nullable: true
          description:
            The default payment source for the subscription. It must belong
            to the customer associated with the subscription and be in a chargeable
            state. If not set, defaults to the customer's default source.
        latest_invoice:
          type: string
          nullable: true
          description: The most recent invoice this subscription has generated.
        pending_setup_intent:
          type: string
          nullable: true
          description:
            We can use this SetupIntent to collect user authentication
            when creating a subscription without immediate payment or updating a subscription's
            payment method, allowing you to optimize for off-session payments.
        schedule:
          type: integer
          title: ID
          nullable: true
          description: The schedule associated with this subscription.
        default_tax_rates:
          type: array
          items:
            type: integer
            title: ID
          description:
            The tax rates that will apply to any subscription item that
            does not have tax_rates set. Invoices created will have their default_tax_rates
            populated from the subscription.
      required:
        - collection_method
        - current_period_end
        - current_period_start
        - customer
        - djstripe_created
        - djstripe_id
        - djstripe_updated
        - id
        - plan
        - status
