      type: object
      properties:
        djstripe_id:
          type: integer
          readOnly: true
          title: ID
        product:
          $ref: "#/components/schemas/Product"
        djstripe_created:
          type: string
          format: date-time
          readOnly: true
        djstripe_updated:
          type: string
          format: date-time
          readOnly: true
        id:
          type: string
          maxLength: 255
        livemode:
          type: boolean
          nullable: true
          description:
            Null here indicates that the livemode status is unknown or
            was previously unrecorded. Otherwise, this field indicates whether this
            record comes from Stripe test mode or live mode operation.
        created:
          type: string
          format: date-time
          nullable: true
          description: The datetime this object was created in stripe.
        metadata:
          nullable: true
          description:
            A set of key/value pairs that you can attach to an object.
            It can be useful for storing additional information about an object in
            a structured format.
        description:
          type: string
          nullable: true
          description: A description of this object.
        active:
          type: boolean
          description: Whether the plan can be used for new purchases.
        aggregate_usage:
          description: |-
            Specifies a usage aggregation strategy for plans of usage_type=metered. Allowed values are `sum` for summing up all usage during a period, `last_during_period` for picking the last usage record reported within a period, `last_ever` for picking the last usage record ever (across period bounds) or max which picks the usage record with the maximum reported usage during a period. Defaults to `sum`.

            * `last_during_period` - Last during period
            * `last_ever` - Last ever
            * `max` - Max
            * `sum` - Sum
          oneOf:
            - $ref: "#/components/schemas/AggregateUsageEnum"
            - $ref: "#/components/schemas/BlankEnum"
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,2})?$
          nullable: true
          description: Amount (as decimal) to be charged on the interval specified.
        amount_decimal:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,12})?$
          nullable: true
          description:
            The unit amount in cents to be charged, represented as a decimal
            string with at most 12 decimal places.
        billing_scheme:
          description: |-
            Describes how to compute the price per period. Either `per_unit` or `tiered`. `per_unit` indicates that the fixed amount (specified in amount) will be charged per unit in quantity (for plans with `usage_type=licensed`), or per unit of total usage (for plans with `usage_type=metered`). `tiered` indicates that the unit pricing will be computed using a tiering strategy as defined using the tiers and tiers_mode attributes.

            * `per_unit` - Per-unit
            * `tiered` - Tiered
          oneOf:
            - $ref: "#/components/schemas/BillingSchemeEnum"
            - $ref: "#/components/schemas/BlankEnum"
        currency:
          type: string
          description: Three-letter ISO currency code
          maxLength: 3
        interval:
          allOf:
            - $ref: "#/components/schemas/IntervalEnum"
          description: |-
            The frequency with which a subscription should be billed.

            * `day` - Day
            * `month` - Month
            * `week` - Week
            * `year` - Year
        interval_count:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description:
            The number of intervals (specified in the interval property)
            between each subscription billing.
        nickname:
          type: string
          description: A brief description of the plan, hidden from customers.
          maxLength: 5000
        tiers:
          nullable: true
          description:
            Each element represents a pricing tier. This parameter requires
            `billing_scheme` to be set to `tiered`.
        tiers_mode:
          nullable: true
          description: |-
            Defines if the tiering price should be `graduated` or `volume` based. In `volume`-based tiering, the maximum quantity within a period determines the per unit price, in `graduated` tiering pricing can successively change as the quantity grows.

            * `graduated` - Graduated
            * `volume` - Volume-based
          oneOf:
            - $ref: "#/components/schemas/TiersModeEnum"
            - $ref: "#/components/schemas/BlankEnum"
            - $ref: "#/components/schemas/NullEnum"
        transform_usage:
          nullable: true
          description:
            Apply a transformation to the reported usage or set quantity
            before computing the billed price. Cannot be combined with `tiers`.
        trial_period_days:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description:
            Number of trial period days granted when subscribing a customer
            to this plan. Null if the plan has no trial period.
        usage_type:
          allOf:
            - $ref: "#/components/schemas/UsageTypeEnum"
          description: |-
            Configures how the quantity per period should be determined, can be either `metered` or `licensed`. `licensed` will automatically bill the `quantity` set for a plan when adding it to a subscription, `metered` will aggregate the total usage based on usage records. Defaults to `licensed`.

            * `licensed` - Licensed
            * `metered` - Metered
        djstripe_owner_account:
          type: string
          nullable: true
          description: The Stripe Account this object belongs to.
      required:
        - active
        - currency
        - djstripe_created
        - djstripe_id
        - djstripe_updated
        - id
        - interval
        - product
    PlanTypeEnum:
      enum:
