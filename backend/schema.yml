components:
  schemas:
    AdminLoginRequest:
      type: object
      description: Serializer for admin login with email and password.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
        - email
        - password
    AdminLoginResponse:
      type: object
      description: Response serializer for admin login.
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - access_token
        - message
        - refresh_token
        - user
    AdminUserDetail:
      type: object
      description: Detailed serializer for user detail view with all fields.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        username:
          type: string
          maxLength: 150
        fullname:
          type: string
          title: Full name
          maxLength: 255
        preferred_language:
          $ref: "#/components/schemas/PreferredLanguageEnum"
        profile_picture:
          type: string
          format: uri
          nullable: true
          readOnly: true
        is_email_verified:
          type: boolean
        is_active:
          type: boolean
          title: Active
          description:
            Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          readOnly: true
        roles:
          type: array
          items:
            type: integer
        roles_display:
          type: array
          items:
            type: string
          readOnly: true
        is_admin:
          type: boolean
          readOnly: true
        has_used_trial:
          type: boolean
          description: Tracks if user has already used their trial subscription
      required:
        - date_joined
        - email
        - id
        - is_admin
        - last_login
        - profile_picture
        - roles_display
        - username
    AdminUserList:
      type: object
      description: Simplified serializer for user listing with only essential fields.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        username:
          type: string
          maxLength: 150
        fullname:
          type: string
          title: Full name
          maxLength: 255
        is_active:
          type: boolean
          title: Active
          description:
            Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        roles_display:
          type: array
          items:
