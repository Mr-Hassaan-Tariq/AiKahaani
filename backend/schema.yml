      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NichePacing"
          description: ""
    put:
      operationId: api_v1_admin_niche_pacings_update
      description: Admin API viewset for managing niche pacings.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this niche pacing.
          required: true
      tags:
        - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/NichePacingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NichePacing"
          description: ""
    patch:
      operationId: api_v1_admin_niche_pacings_partial_update
