          description:
            A URL of a publicly-accessible webpage for this product. Only
            applicable to products of `type=good`.
          maxLength: 799
        statement_descriptor:
          type: string
          description:
            Extra information about a product which will appear on your
            customer's credit card statement. In the case that multiple products are
            billed at once, the first statement descriptor will be used. Only available
            on products of type=`service`.
          maxLength: 22
        unit_label:
          type: string
          maxLength: 12
        djstripe_owner_account:
          type: string
          nullable: true
          description: The Stripe Account this object belongs to.
        default_price:
