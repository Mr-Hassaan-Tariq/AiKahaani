      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchedNichePacingRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/PatchedNichePacingRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PatchedNichePacingRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NichePacing"
          description: ""
    delete:
