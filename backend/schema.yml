        caption:
          type: string
          description:
            A short one-line description of the product, meant to be displayableto
            the customer. Only applicable to products of `type=good`.
          maxLength: 5000
        deactivate_on:
          nullable: true
          description:
            An array of connect application identifiers that cannot purchase
            this product. Only applicable to products of `type=good`.
        images:
          nullable: true
          description:
            A list of up to 8 URLs of images for this product, meant to
            be displayable to the customer. Only applicable to products of `type=good`.
        package_dimensions:
          nullable: true
          description:
            The dimensions of this product for shipping purposes. A SKU
            associated with this product can override this value by having its own
            `package_dimensions`. Only applicable to products of `type=good`.
        shippable:
          type: boolean
