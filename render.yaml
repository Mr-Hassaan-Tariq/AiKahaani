services:
  - type: web
    name: tubegenius-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn app.main:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
